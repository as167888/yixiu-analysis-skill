<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修佬说 · 游戏行业投资分析</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-chat: #1a1a2e;
  --bg-user-msg: #0f3460;
  --bg-assistant-msg: #16213e;
  --bg-input: #16213e;
  --text-primary: #e8e8e8;
  --text-secondary: #a0a0b0;
  --text-muted: #6c6c80;
  --accent: #e94560;
  --accent-hover: #d63850;
  --border: #2a2a4a;
  --code-bg: #0d1117;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  text-align: center;
  flex-shrink: 0;
}
header h1 {
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}
header h1 .icon { color: var(--accent); margin-right: 4px; }
header .subtitle {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Chat Container */
#chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  scroll-behavior: smooth;
}

/* Messages */
.message {
  max-width: 800px;
  margin: 0 auto 16px;
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.message .role {
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text-secondary);
}
.message.user .role { color: var(--accent); }
.message.assistant .role { color: #4fc3f7; }

.message .content {
  line-height: 1.75;
  font-size: 0.95rem;
}
.message.user .content {
  background: var(--bg-user-msg);
  padding: 12px 16px;
  border-radius: 12px 12px 4px 12px;
}
.message.assistant .content {
  background: var(--bg-assistant-msg);
  padding: 16px 20px;
  border-radius: 12px 12px 12px 4px;
  border: 1px solid var(--border);
}

/* Markdown Styles */
.content h2 { font-size: 1.1rem; margin: 14px 0 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.content h3 { font-size: 1rem; margin: 12px 0 4px; }
.content p { margin: 6px 0; }
.content ul, .content ol { margin: 6px 0; padding-left: 20px; }
.content li { margin: 3px 0; }
.content strong { color: #ffd166; font-weight: 600; }
.content code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.85em;
  font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
}
.content pre {
  background: var(--code-bg);
  padding: 12px 16px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 8px 0;
  border: 1px solid var(--border);
}
.content pre code { background: none; padding: 0; }
.content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--text-secondary);
  margin: 8px 0;
}
.content a { color: #4fc3f7; }

/* Typing indicator */
.typing-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  margin: 0 2px;
  animation: typingBounce 1.3s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.15s; }
.typing-dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Loading */
#loading {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.85rem;
  padding: 8px;
}

/* Welcome */
.welcome {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}
.welcome .logo { font-size: 3rem; margin-bottom: 12px; }
.welcome h2 { font-size: 1.5rem; margin-bottom: 8px; color: var(--text-primary); }
.welcome p { font-size: 0.9rem; max-width: 360px; margin: 0 auto; line-height: 1.6; }

/* Input Area */
#input-area {
  flex-shrink: 0;
  padding: 12px 20px 16px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
}
#input-wrap {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
#message-input {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text-primary);
  font-size: 0.95rem;
  font-family: inherit;
  resize: none;
  min-height: 46px;
  max-height: 160px;
  line-height: 1.5;
  outline: none;
  transition: border-color 0.2s;
}
#message-input:focus { border-color: var(--accent); }
#message-input::placeholder { color: var(--text-muted); }

#send-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  flex-shrink: 0;
  white-space: nowrap;
}
#send-btn:hover { background: var(--accent-hover); }
#send-btn:active { transform: scale(0.97); }
#send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

#input-footer {
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 8px;
}

/* Scrollbar */
#chat-container::-webkit-scrollbar { width: 6px; }
#chat-container::-webkit-scrollbar-track { background: transparent; }
#chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Mobile */
@media (max-width: 600px) {
  header { padding: 10px 14px; }
  header h1 { font-size: 1.1rem; }
  #chat-container { padding: 12px 10px; }
  .message .content { font-size: 0.9rem; }
  #input-area { padding: 10px 10px 14px; }
  #send-btn { padding: 12px 14px; font-size: 0.85rem; }
}

/* Error */
.error-msg { color: #ff5252; font-style: italic; }

/* Source citation */
.cite { font-size: 0.78rem; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 10px; padding-top: 8px; }
</style>
</head>
<body>

<header>
  <h1><span class="icon">🔴</span>修佬说</h1>
  <div class="subtitle">游戏行业投资分析 · AI助手</div>
</header>

<div id="chat-container">
  <div class="welcome">
    <div class="logo">🎮</div>
    <h2>你好，我是修佬</h2>
    <p>我基于逸修1（2017-2026）的知识体系，专注游戏行业与投资分析。有问题尽管问。</p>
  </div>
</div>

<div id="input-area">
  <div id="input-wrap">
    <textarea id="message-input" placeholder="输入你的问题，如：怎么看心动公司最近的股价表现？" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">发送</button>
  </div>
  <div id="input-footer">基于逸修1 (2017-2026) 知识体系 · AI生成内容不构成投资建议</div>
</div>

<script>
const chatContainer = document.getElementById('chat-container');
const messageInput = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');
let isLoading = false;

// Auto-resize textarea
messageInput.addEventListener('input', () => {
  messageInput.style.height = 'auto';
  messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px';
});

// Enter to send, Shift+Enter for newline
messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function scrollToBottom() {
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function addMessage(role, content) {
  const welcome = chatContainer.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="role">${role === 'user' ? '你' : '修佬'}</div><div class="content">${content}</div>`;
  chatContainer.appendChild(div);
  scrollToBottom();
  return div;
}

function setLoading(loading) {
  isLoading = loading;
  sendBtn.disabled = loading;
  messageInput.disabled = loading;

  let loadingEl = document.getElementById('loading');
  if (loading) {
    if (!loadingEl) {
      loadingEl = document.createElement('div');
      loadingEl.id = 'loading';
      loadingEl.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
      chatContainer.appendChild(loadingEl);
    }
  } else {
    if (loadingEl) loadingEl.remove();
  }
}

async function sendMessage() {
  if (isLoading) return;
  const msg = messageInput.value.trim();
  if (!msg) return;

  messageInput.value = '';
  messageInput.style.height = 'auto';
  addMessage('user', escapeHtml(msg));

  setLoading(true);

  // Create assistant message placeholder
  const welcome = chatContainer.querySelector('.welcome');
  if (welcome) welcome.remove();
  const assistantDiv = document.createElement('div');
  assistantDiv.className = 'message assistant';
  assistantDiv.innerHTML = '<div class="role">修佬</div><div class="content"></div>';
  chatContainer.appendChild(assistantDiv);
  const contentEl = assistantDiv.querySelector('.content');

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });

    if (!response.ok) {
      contentEl.innerHTML = `<span class="error-msg">请求失败: HTTP ${response.status}</span>`;
      setLoading(false);
      return;
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6);
        try {
          const data = JSON.parse(jsonStr);
          if (data.error) {
            contentEl.innerHTML += `<span class="error-msg">错误: ${escapeHtml(data.error)}</span>`;
          } else if (data.content) {
            fullText += data.content;
            // Render markdown progressively
            contentEl.innerHTML = marked.parse(fullText);
            scrollToBottom();
          } else if (data.done) {
            // Final render
            contentEl.innerHTML = marked.parse(fullText);
          }
        } catch (e) {
          // partial JSON, skip
        }
      }
    }
  } catch (e) {
    contentEl.innerHTML = `<span class="error-msg">网络错误: ${escapeHtml(e.message)}</span>`;
  }

  setLoading(false);
  scrollToBottom();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
